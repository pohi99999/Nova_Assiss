name: Next.js build (Node 20)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (capture logs)
        run: |
          npm run build 2>&1 | tee build.log

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: next-build-log
          path: build.log

      - name: Pack .next output (if present)
        run: |
          if [ -d .next ]; then tar -czf next-output.tar.gz .next || true; fi

      - name: Upload .next output
        uses: actions/upload-artifact@v4
        with:
          name: next-output
          path: next-output.tar.gz
